[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NEXT_PUBLIC_SITE_URL = "https://primecastt.site"
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Define Netlify form handling settings
[build.processing.html]
  pretty_urls = true

# Note: We've removed the Netlify subdomain redirect to allow Cloudflare blocking to work

# CORS headers for Netlify Functions
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "POST, OPTIONS"

# Cache control for static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/channels/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Define success redirect for the subscription form
[[redirects]]
  from = "/subscribe/success"
  to = "/subscribe?success=true"
  status = 302

# Add form submission redirect
[[redirects]]
  from = "/success"
  to = "/subscribe?success=true"
  status = 302

# Handle 404s properly
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404
