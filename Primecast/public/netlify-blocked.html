<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Access Denied</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f8d7da;
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 500px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15);
      padding: 40px;
      text-align: center;
    }
    h1 {
      color: #dc3545;
      margin-bottom: 20px;
    }
    p {
      color: #555;
      margin-bottom: 25px;
      line-height: 1.6;
    }
    .button {
      display: inline-block;
      background: #0d6efd;
      color: white;
      padding: 10px 25px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    .button:hover {
      background: #0a58ca;
    }
    .icon {
      width: 60px;
      height: 60px;
      background: #f8d7da;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .warning-svg {
      width: 30px;
      height: 30px;
      fill: #dc3545;
    }
  </style>
  <!-- Prevent indexing -->
  <meta name="robots" content="noindex,nofollow">
  <!-- Attempt to redirect -->
  <meta http-equiv="refresh" content="10;url=https://primecastt.site">
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg class="warning-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
    </div>
    <h1>Access Denied</h1>
    <p>This Netlify subdomain is not authorized to display Veltrix IPTV content.</p>
    <p>Please use our official website to access our premium IPTV services.</p>
    <a href="https://veltrix.site" class="button">Go to veltrix.site</a>
    <p style="margin-top: 30px; font-size: 14px; color: #777">Redirecting automatically in 10 seconds...</p>
  </div>
  
  <!-- Script to ensure blocking works even if meta refresh fails -->
  <script>
    // Redirect after 10 seconds
    setTimeout(function() {
      window.location.href = "https://veltrix.site";
    }, 10000);
    
    // Block all other scripts
    document.addEventListener('DOMContentLoaded', function() {
      // Remove any other scripts
      document.querySelectorAll('script:not([data-protected="true"])').forEach(function(script) {
        if (script !== document.currentScript) {
          script.parentNode.removeChild(script);
        }
      });
    });
  </script>
</body>
</html>
